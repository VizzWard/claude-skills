name: Release Skills

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skills into .skill files
        run: |
          mkdir -p dist
          for dir in */; do
            name="${dir%/}"
            # Skip directories that are not skills
            [[ "$name" == _* || "$name" == .* || "$name" == dist ]] && continue
            # A valid skill must have a SKILL.md
            [ -f "$dir/SKILL.md" ] || continue
            echo "Packaging $name ..."
            (cd "$dir" && zip -r "../dist/${name}.skill" .)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.skill
